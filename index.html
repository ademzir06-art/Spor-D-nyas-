​<script>
function tabAc(evt, sayfaIsmi) {
var i, icerik, butonlar;
icerik = document.getElementsByClassName("icerik");
for (i = 0; i < icerik.length; i++) { icerik[i].style.display = "none"; }
butonlar = document.getElementsByClassName("tab-button");
for (i = 0; i < butonlar.length; i++) { butonlar[i].className = butonlar[i].className.replace(" active", ""); }
document.getElementById(sayfaIsmi).style.display = "block";
evt.currentTarget.className += " active";
}
</script>
